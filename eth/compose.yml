services:

  geth:
    image: ethereum/client-go:stable
    container_name: geth
    restart: unless-stopped
    ports:
      - "8545:8545"
      - "30303:30303"
      - "30303:30303/udp"
    volumes:
      - ./jwt.hex:/jwt.hex
      - ./eth_data:/root/.ethereum
    command: >
      --mainnet
      --db.engine "pebble"
      --state.scheme "path"
      --syncmode "full"
      --gcmode "full"
      --http
      --http.port 8545
      --http.addr 0.0.0.0
      --http.api "eth,net,web3"
      --http.corsdomain "*"
      --http.vhosts "*"
      --ws
      --ws.port 8545
      --ws.addr 0.0.0.0
      --ws.api "eth,net,web3"
      --ws.origins "*"
      --authrpc.port 8551
      --authrpc.vhosts "*"
      --authrpc.jwtsecret "/jwt.hex"
      --port 30303
      --discovery.port 30303
      --cache 8192
      --txlookuplimit 0
    healthcheck:
      test: ["CMD-SHELL", "geth attach --exec 'net.listening' http://localhost:8545 2>/dev/null | grep -q true || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: "4"
        reservations:
          memory: 8G
          cpus: "2"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  nimbus:
    image: statusim/nimbus-eth2:multiarch-v25.7.1
    container_name: nimbus
    restart: unless-stopped
    user: root
    ports:
      - 5052:5052
      - 9000:9000
      - 9000:9000/udp
    volumes:
      - ./jwt.hex:/jwt.hex
      - ./nimbus_data:/home/user/nimbus-eth2/build/data
    command: >
      --network="mainnet"
      --data-dir="/home/user/nimbus-eth2/build/data"
      --tcp-port=9000
      --udp-port=9000
      --rest
      --rest-port=5052
      --rest-address="0.0.0.0"
      --rest-allow-origin="*"
      --web3-url="http://geth:8551"
      --jwt-secret="/jwt.hex"
      --enr-auto-update=true
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "2"
        reservations:
          memory: 4G
          cpus: "1"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
