services:

  nitro-node:
    image: offchainlabs/nitro-node:v3.6.5-89cef87
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - ./data:/home/user/.arbitrum
      - ./snapdata:/arbitrum-node/snapdata/
    ports:
      - "8545:8545"
    command:
    - --parent-chain.connection.url="${ARBONE_L1_URL:?err}"
    - --parent-chain.blob-client.beacon-url="${ARBONE_BEACON_URL:?err}"
    - --chain.id=42161
    - --http.api=net,web3,eth,arb
    - --http.corsdomain=*
    - --http.addr=0.0.0.0
    - --http.vhosts=*
    - --http.port=8545
    - --ws.addr=0.0.0.0
    - --ws.port=8545
    - --ws.origins=*
    - --ws.api=net,web3,eth,arb
    - --execution.tx-lookup-limit=0
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8545 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"net_listening\",\"params\":[],\"id\":1}' | grep -q true || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "2"
        reservations:
          memory: 4G
          cpus: "1"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
