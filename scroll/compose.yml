services:

  l2geth:
      image: scrolltech/l2geth:scroll-v5.9.2
      container_name: l2geth-docker
      stop_signal: SIGINT
      stop_grace_period: 60s
      restart: "unless-stopped"
      environment:
      - CHAIN_ID=534352
      - RUST_LOG="info"
      volumes:
      - ./data:/volume/l2geth/data
      ports:
      - 8545:8545
      - 30303:30303
      - 30303:30303/udp
      command: >
        --scroll
        --scroll-mpt
        --snapshot=false
        --metrics
        --pprof.addr 0.0.0.0
        --pprof.port 6060
        --datadir /volume/l2geth/data
        --gcmode archive
        --http
        --http.addr 0.0.0.0
        --http.port 8545
        --http.api eth,net,web3,debug,scroll
        --http.corsdomain "*"
        --http.vhosts "*"
        --ws
        --ws.addr 0.0.0.0
        --ws.port 8545
        --ws.api eth,net,web3,debug,scroll
        --ws.origins "*"
        --cache.noprefetch
        --txlookuplimit 0
        --l1.endpoint "${SCROLL_L1_ENDPOINT:?err}"
        --da.blob.blobscan "https://api.blobscan.com/blobs/"
        --da.blob.beaconnode "${SCROLL_BEACON_ENDPOINT:?err}"
        --da.blob.awss3 "https://scroll-sepolia-blob-data.s3.us-west-2.amazonaws.com/"
        --cache.snapshot=0
      healthcheck:
        test: ["CMD-SHELL", "geth attach --exec 'net.listening' http://localhost:8545 2>/dev/null | grep -q true || exit 1"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 120s
      deploy:
        resources:
          limits:
            memory: 8G
            cpus: "2"
          reservations:
            memory: 4G
            cpus: "1"
      logging:
          driver: "json-file"
          options:
              max-size: "100m"
              max-file: "3"
